server:
  port: 5000                    # Порт для запуска frontend-приложения
  protocol: http                # http/https - протокол, по которому приложение слушает запросы
  backend:
    protocol: http             # http/https - протокол для запросов к backend
    host: localhost            # Хост backend
    port: 8080                 # Порт backend

auth:
  jwt:
    algorithm: ES256             # Алгоритм подписи
    secret: "your-secret-key"    # Секретный ключ (для HMAC)
    expiration: 7200             # Время жизни токена в секундах
    fields:                      # Поля, включаемые в JWT
      - name: "sub"
        value: ${userId}
      - name: "name"
        value: ${userId}
      - name: "channel"
        value: ${channel}
      - name: "scope"
        value: "ECM_USER"
      - name: "iss"
        value: "ISS"

