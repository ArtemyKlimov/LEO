    "components": {
        "schemas": {
            "SavedSearchEditResult": {
                "required": [
                    "primaryTerm",
                    "seqNo",
                    "version"
                ],
                "type": "object",
                "properties": {
                    "version": {
                        "type": "integer",
                        "description": "Версия записи",
                        "format": "int64"
                    },
                    "seqNo": {
                        "type": "integer",
                        "description": "Opensearch может использовать порядковый номер операций, чтобы убедиться, что более новая версия документа никогда не будет отменена изменением, которому присвоен меньший порядковый номер.",
                        "format": "int64"
                    },
                    "primaryTerm": {
                        "type": "integer",
                        "description": "Первичный термин для группы репликации - это просто счетчик того, сколько раз менялся первичный шард.",
                        "format": "int64"
                    }
                },
                "description": "Результат редактирования профиля поиска"
            },
            "EditSavedSearchRequest": {
                "required": [
                    "name",
                    "primaryTerm",
                    "seqNo"
                ],
                "type": "object",
                "properties": {
                    "seqNo": {
                        "type": "integer",
                        "description": "Opensearch может использовать порядковый номер операций, чтобы убедиться, что более новая версия документа никогда не будет отменена изменением, которому присвоен меньший порядковый номер.",
                        "format": "int64"
                    },
                    "primaryTerm": {
                        "type": "integer",
                        "description": "Первичный термин для группы репликации - это просто счетчик того, сколько раз менялся первичный шард.",
                        "format": "int64"
                    },
                    "name": {
                        "maxLength": 500,
                        "minLength": 3,
                        "type": "string",
                        "description": "Имя профиля поиска (должно быть уникально в пределах списка projectCode)"
                    },
                    "queryAttributes": {
                        "$ref": "#/components/schemas/SavedSearchAttributesRequest"
                    },
                    "filters": {
                        "type": "array",
                        "description": "Массив фильтров для атрибутов",
                        "items": {
                            "$ref": "#/components/schemas/SavedSearchFilter"
                        }
                    }
                },
                "description": "Описание существующего профиля поиска"
            },
            "SavedSearchAttributesRequest": {
                "type": "object",
                "properties": {
                    "startTime": {
                        "type": "string",
                        "format": "date-time",
                        "example": "2022-01-01T00:00:00Z"
                    },
                    "endTime": {
                        "type": "string",
                        "format": "date-time",
                        "example": "2022-01-01T00:00:00Z"
                    }
                },
                "description": "This model represents available fields to query in Hive or Open Search"
            },
            "SavedSearchFilter": {
                "required": [
                    "attributeName",
                    "attributeValue"
                ],
                "type": "object",
                "properties": {
                    "filterOperator": {
                        "type": "string",
                        "description": "Оператор фильтра (список значений)",
                        "default": "FilterOperatorEnum.IS",
                        "enum": [
                            "IS",
                            "IS NOT",
                            "IS ONE OF",
                            "IS NOT ONE OF",
                            "EXIST",
                            "DOES NOT EXIST"
                        ]
                    },
                    "attributeName": {
                        "type": "string",
                        "description": "Наименование атрибута"
                    },
                    "attributeValue": {
